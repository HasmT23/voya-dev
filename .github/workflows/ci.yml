name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - backend/api-service
          - backend/registry-service
          - backend/ws-service
          - backend/agent-service
          - desktop-agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ${{ matrix.service }}/package.json

      - name: Install dependencies
        run: npm install
        working-directory: ${{ matrix.service }}

      - name: Build
        run: npm run build
        working-directory: ${{ matrix.service }}

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Audit api-service
        run: npm audit --omit=dev || true
        working-directory: backend/api-service

      - name: Audit registry-service
        run: npm audit --omit=dev || true
        working-directory: backend/registry-service

      - name: Audit ws-service
        run: npm audit --omit=dev || true
        working-directory: backend/ws-service

      - name: Audit agent-service
        run: npm audit --omit=dev || true
        working-directory: backend/agent-service

  secret-scanning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-and-build]
    strategy:
      matrix:
        service:
          - name: api-service
            context: backend/api-service
          - name: registry-service
            context: backend/registry-service
          - name: ws-service
            context: backend/ws-service
          - name: agent-service
            context: backend/agent-service
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t voya-${{ matrix.service.name }}:test ${{ matrix.service.context }}
