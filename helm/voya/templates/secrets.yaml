apiVersion: v1
kind: Secret
metadata:
  name: voya-secrets
type: Opaque
stringData:
  jwt-secret: {{ .Values.secrets.jwtSecret | quote }}
  anthropic-api-key: {{ .Values.secrets.anthropicApiKey | quote }}
  google-client-id: {{ .Values.secrets.googleClientId | quote }}
  google-client-secret: {{ .Values.secrets.googleClientSecret | quote }}
  stripe-secret-key: {{ .Values.secrets.stripeSecretKey | quote }}
  stripe-webhook-secret: {{ .Values.secrets.stripeWebhookSecret | quote }}
  database-url: {{ printf "postgresql://voya:%s@postgres:5432/voya" .Values.postgresql.auth.username | quote }}
