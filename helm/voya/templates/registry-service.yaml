apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry-service
  labels:
    app: voya
    component: registry-service
spec:
  replicas: {{ .Values.replicaCount.registryService }}
  selector:
    matchLabels:
      app: voya
      component: registry-service
  template:
    metadata:
      labels:
        app: voya
        component: registry-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: registry-service
          image: "{{ .Values.image.registry }}/voya-registry-service:{{ .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.registryService.port }}
          env:
            - name: PORT
              value: "{{ .Values.registryService.port }}"
            - name: NODE_ENV
              value: "production"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: voya-secrets
                  key: jwt-secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: voya-secrets
                  key: database-url
          resources:
            {{- toYaml .Values.registryService.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.registryService.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: registry-service
spec:
  selector:
    app: voya
    component: registry-service
  ports:
    - port: {{ .Values.registryService.port }}
      targetPort: {{ .Values.registryService.port }}
