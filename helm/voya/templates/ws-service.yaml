apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-service
  labels:
    app: voya
    component: ws-service
spec:
  replicas: {{ .Values.replicaCount.wsService }}
  selector:
    matchLabels:
      app: voya
      component: ws-service
  template:
    metadata:
      labels:
        app: voya
        component: ws-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: ws-service
          image: "{{ .Values.image.registry }}/voya-ws-service:{{ .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.wsService.port }}
          env:
            - name: PORT
              value: "{{ .Values.wsService.port }}"
            - name: NODE_ENV
              value: "production"
            - name: REGISTRY_URL
              value: "http://registry-service:{{ .Values.registryService.port }}"
            - name: AGENT_URL
              value: "http://agent-service:{{ .Values.agentService.port }}"
          resources:
            {{- toYaml .Values.wsService.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.wsService.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ws-service
spec:
  selector:
    app: voya
    component: ws-service
  ports:
    - port: {{ .Values.wsService.port }}
      targetPort: {{ .Values.wsService.port }}
